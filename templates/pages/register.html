{% extends 'base.html' %}
{% block title %}Регистрация - CodeKids{% endblock %}
{% block content %}
<main>
    <div class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-slate-50 to-indigo-50/40 py-20">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <span class="text-3xl font-extrabold gradient-text">CodeKids</span>
                <p class="text-gray-500 mt-2">Создайте аккаунт</p>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-xl shadow-indigo-50/80 border border-gray-100">
                <h2 class="text-2xl font-extrabold text-gray-900 mb-6">Регистрация</h2>

                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Имя</label>
                        <input type="text" placeholder="Ваше имя"
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all"/>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                        <input type="email" placeholder="you@example.com"
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all"/>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Пароль</label>
                        <input type="password" placeholder="••••••••"
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all"/>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Повторите пароль</label>
                        <input type="password" placeholder="••••••••"
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all"/>
                    </div>

                    <button type="submit"
                            class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-100 hover:shadow-indigo-200 hover:scale-[1.02] active:scale-95 mt-2">
                        Зарегистрироваться →
                    </button>
                </form>

                <p class="text-sm text-center text-gray-500 mt-6">
                    Уже есть аккаунт?
                    <a href="{% url 'login_form' %}" class="text-indigo-600 hover:underline font-medium">Войти</a>
                </p>
            </div>
        </div>
    </div>
</main>
{% endblock %}
