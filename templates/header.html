<header class="bg-white/80 backdrop-blur-lg shadow-sm sticky top-0 z-50 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="{% url 'home' %}">
            <span class="text-2xl font-extrabold gradient-text">CodeKids</span>
        </a>
        <nav class="flex items-center gap-6 text-sm font-medium">
            <a href="{% url 'home' %}#contacts" class="text-gray-500 hover:text-indigo-600 transition">Контакты</a>

            {% if user.is_staff %}
            <a href="/admin" class="text-gray-500 hover:text-indigo-600 transition">Админка</a>
            <form method="POST" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit"
                        class="text-gray-500 hover:text-indigo-600 transition text-sm font-medium bg-transparent p-0 m-0 border-none cursor-pointer">
                    Выход
                </button>
            </form>
            {% else %}
            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="text-gray-500 hover:text-indigo-600 transition">Личный кабинет</a>
            <form method="POST" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit"
                        class="text-gray-500 hover:text-indigo-600 transition text-sm font-medium bg-transparent p-0 m-0 border-none cursor-pointer">
                    Выход
                </button>
            </form>
            {% else %}
            <a href="{% url 'login_form' %}" class="text-gray-500 hover:text-indigo-600 transition">Вход</a>
            {% endif %}
            {% endif %}

        </nav>
    </div>
</header>
