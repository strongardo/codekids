{% extends 'base.html' %}
{% block title %} {{ thank_you.title }} {% endblock %}
{% block content %}
<main>
    <div class="min-h-screen flex flex-col items-center justify-center px-4 text-center bg-gradient-to-br from-slate-50 to-indigo-50/40">
        <div class="bg-white shadow-xl shadow-indigo-50/80 border border-gray-100 rounded-3xl p-12 max-w-md w-full">
            <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h1 class="text-3xl font-extrabold text-gray-900 mb-4">{{ thank_you.title }}</h1>
            <p class="text-gray-500 mb-8 leading-relaxed">
                {{ thank_you.text }}<br/>
                Пока можете вернуться на главную.
            </p>

            <a href="{% url 'home' %}"
               class="inline-block bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-bold px-8 py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-100 hover:scale-105">
                На главную →
            </a>
        </div>
    </div>
</main>
{% endblock %}
