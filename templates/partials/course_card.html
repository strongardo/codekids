<div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 mb-6 overflow-hidden">
    <div class="h-1 bg-gradient-to-r from-indigo-500 via-violet-500 to-pink-500"></div>
    <div class="p-6 md:p-8">
        <h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-3">{{ course.title }}</h3>
        <p class="text-gray-500 text-sm md:text-base leading-relaxed mb-6">{{ course.description }}</p>
        <div class="flex flex-wrap gap-3">
            <span class="inline-flex items-center gap-1.5 bg-indigo-50 text-indigo-700 text-sm font-medium px-3 py-1.5 rounded-lg">
                <i class="fas fa-signal text-xs"></i>
                {{ course.get_level_display }}
            </span>
            <span class="inline-flex items-center gap-1.5 bg-violet-50 text-violet-700 text-sm font-medium px-3 py-1.5 rounded-lg">
                <i class="fas fa-calendar-check text-xs"></i>
                {{ course.duration }} занятий
            </span>
            <span class="inline-flex items-center gap-1.5 bg-pink-50 text-pink-700 text-sm font-medium px-3 py-1.5 rounded-lg">
                <i class="fas fa-child text-xs"></i>
                от {{ course.min_age }} лет
            </span>
        </div>
    </div>
</div>
